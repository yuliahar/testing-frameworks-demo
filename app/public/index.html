<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Frameworks Demo</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧪 Testing Frameworks Demo</h1>
            <p>Demo application for Cypress & Jest testing with Qase integration</p>
        </header>

        <main>
            <section class="form-section">
                <h2>User Management</h2>
                <form id="userForm">
                    <input type="hidden" id="userId" value="">
                    <div class="form-group">
                        <label for="userName">Name:</label>
                        <input type="text" id="userName" name="name" required placeholder="Enter name">
                    </div>
                    <div class="form-group">
                        <label for="userEmail">Email:</label>
                        <input type="email" id="userEmail" name="email" required placeholder="Enter email">
                    </div>
                    <div class="form-group">
                        <label for="userAge">Age:</label>
                        <input type="number" id="userAge" name="age" min="0" max="150" placeholder="Enter age">
                    </div>
                    <div class="form-buttons">
                        <button type="submit" id="submitBtn" class="btn btn-primary">Add User</button>
                        <button type="button" id="cancelBtn" class="btn btn-secondary" style="display:none;">Cancel</button>
                    </div>
                </form>
                <div id="message" class="message"></div>
            </section>

            <section class="users-section">
                <div class="section-header">
                    <h2>Users List</h2>
                    <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
                </div>
                <div id="usersList" class="users-list">
                    <!-- Users will be loaded here -->
                </div>
            </section>
        </main>

        <footer>
            <p>Built with Express.js | Tested with Cypress & Jest | Reported with Qase</p>
        </footer>
    </div>

    <script src="/app.js"></script>
</body>
</html>
