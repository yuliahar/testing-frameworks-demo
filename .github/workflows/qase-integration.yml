name: Qase Integration Tests

on:
  workflow_dispatch:
    inputs:
      run_name:
        description: "Custom test run name"
        required: false
        default: "Manual Test Run"

jobs:
  jest-qase:
    name: Jest API Tests → Qase.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 23.11.1
        uses: actions/setup-node@v4
        with:
          node-version: "23.11.1"
          cache: "npm"

      - name: Install main app dependencies
        run: npm install

      - name: Install Jest test dependencies
        working-directory: ./jest-tests
        run: npm install

      - name: Start API Server
        run: |
          npm start &
          sleep 5
          curl -f http://localhost:3000/api/health || exit 1

      - name: Run Jest tests with Qase reporting
        working-directory: ./jest-tests
        continue-on-error: true
        id: jest-tests
        run: npm run test:qase
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_PROJECT_CODE: ${{ secrets.QASE_PROJECT_CODE }}
          QASE_MODE: testops
          QASE_RUN_NAME: "Jest API Tests - Run #${{ github.run_number }} - ${{ github.ref_name }}"
          QASE_RUN_DESCRIPTION: "Automated API integration tests from GitHub Actions. Commit: ${{ github.sha }}"
          API_URL: http://localhost:3000/api

      - name: Check Jest test results
        if: always()
        run: |
          if [ "${{ steps.jest-tests.outcome }}" == "failure" ]; then
            echo "⚠️ Jest tests failed but results were uploaded to Qase.io"
            exit 1
          fi

      - name: Upload Jest reports (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-qase-reports
          path: jest-tests/reports/
          retention-days: 30

      - name: Comment on PR with Qase link
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const projectCode = '${{ secrets.QASE_PROJECT_CODE }}';
            const runNumber = '${{ github.run_number }}';
            const testOutcome = '${{ steps.jest-tests.outcome }}';
            const statusIcon = testOutcome === 'success' ? '✅' : '⚠️';

            const comment = `## 🧪 ${statusIcon} Qase.io Test Results - Jest API Tests

            **Test Run**: [View in Qase.io](https://app.qase.io/run/${projectCode})
            **Run Number**: #${runNumber}
            **Status**: ${testOutcome === 'success' ? 'Passed' : 'Failed'}
            **Branch**: \`${{ github.ref_name }}\`
            **Commit**: \`${{ github.sha }}\`

            Results have been reported to Qase.io. Check the link above for detailed test results${testOutcome === 'failure' ? ' and failure analysis' : ''}.
            `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });

  cypress-qase:
    name: Cypress UI Tests → Qase.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 23.11.1
        uses: actions/setup-node@v4
        with:
          node-version: "23.11.1"
          cache: "npm"

      - name: Install main app dependencies
        run: npm install

      - name: Install Cypress test dependencies
        working-directory: ./cypress-tests
        run: npm install

      - name: Start API Server
        run: |
          npm start &
          sleep 5
          curl -f http://localhost:3000 || exit 1

      - name: Run Cypress tests with Qase reporting
        working-directory: ./cypress-tests
        continue-on-error: true
        id: cypress-tests
        run: npm run cy:run:qase -- --browser chrome
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_PROJECT_CODE: ${{ secrets.QASE_PROJECT_CODE }}
          QASE_MODE: testops
          QASE_RUN_NAME: "Cypress UI Tests - Run #${{ github.run_number }} - ${{ github.ref_name }}"
          QASE_RUN_DESCRIPTION: "Automated UI/E2E tests from GitHub Actions. Commit: ${{ github.sha }}"
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Check Cypress test results
        if: always()
        run: |
          if [ "${{ steps.cypress-tests.outcome }}" == "failure" ]; then
            echo "⚠️ Cypress tests failed but results were uploaded to Qase.io"
            exit 1
          fi

      - name: Upload Cypress screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-qase-screenshots
          path: cypress-tests/cypress/screenshots
          retention-days: 30

      - name: Comment on PR with Qase link
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const projectCode = '${{ secrets.QASE_PROJECT_CODE }}';
            const runNumber = '${{ github.run_number }}';
            const testOutcome = '${{ steps.cypress-tests.outcome }}';
            const statusIcon = testOutcome === 'success' ? '✅' : '⚠️';

            const comment = `## 🌲 ${statusIcon} Qase.io Test Results - Cypress UI Tests

            **Test Run**: [View in Qase.io](https://app.qase.io/run/${projectCode})
            **Run Number**: #${runNumber}
            **Status**: ${testOutcome === 'success' ? 'Passed' : 'Failed'}
            **Branch**: \`${{ github.ref_name }}\`
            **Commit**: \`${{ github.sha }}\`

            Results have been reported to Qase.io. Check the link above for detailed test results${testOutcome === 'failure' ? ' and failure analysis' : ''}.
            `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [jest-qase, cypress-qase]
    if: always()

    steps:
      - name: Create Summary
        run: |
          echo "# 🎯 Qase.io Test Integration Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Jest API Tests**: ${{ needs.jest-qase.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cypress UI Tests**: ${{ needs.cypress-qase.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Qase.io Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed results at: [Qase.io Dashboard](https://app.qase.io/projects)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Information:**" >> $GITHUB_STEP_SUMMARY
          echo "- Run Number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
