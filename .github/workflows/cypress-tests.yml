name: Cypress UI Tests

on:
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 23.11.1
        uses: actions/setup-node@v4
        with:
          node-version: "23.11.1"
          cache: "npm"

      - name: Install dependencies - Main App
        run: npm install

      - name: Install dependencies - Cypress Tests
        working-directory: ./cypress-tests
        run: npm install

      - name: Start API Server
        run: |
          npm start &
          sleep 5
          curl -f http://localhost:3000/api/health || exit 1
          curl -f http://localhost:3000 || exit 1

      - name: Run Cypress Tests
        working-directory: ./cypress-tests
        run: npm run cy:run -- --browser chrome --config video=false
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Upload Cypress Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress-tests/cypress/screenshots
          retention-days: 30

      - name: Upload Cypress Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports
          path: cypress-tests/cypress/reports
          retention-days: 30

      - name: Publish Cypress Test Results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportsDir = 'cypress-tests/cypress/reports';
            if (fs.existsSync(reportsDir)) {
              const files = fs.readdirSync(reportsDir);
              const jsonFiles = files.filter(f => f.endsWith('.json'));

              let totalTests = 0;
              let passedTests = 0;
              let failedTests = 0;

              jsonFiles.forEach(file => {
                const content = JSON.parse(fs.readFileSync(path.join(reportsDir, file), 'utf8'));
                if (content.stats) {
                  totalTests += content.stats.tests || 0;
                  passedTests += content.stats.passes || 0;
                  failedTests += content.stats.failures || 0;
                }
              });

              const body = `## 🧪 Cypress UI Tests Results (Chrome)

              | Metric | Count |
              |--------|-------|
              | Total Tests | ${totalTests} |
              | ✅ Passed | ${passedTests} |
              | ❌ Failed | ${failedTests} |
              | Success Rate | ${totalTests > 0 ? ((passedTests/totalTests)*100).toFixed(2) : 0}% |
              | Browser | Chrome |

              [View detailed reports in artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `;

              if (context.eventName === 'pull_request') {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: body
                });
              }
            }

      - name: Deploy Test Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./cypress-tests/cypress/reports
          destination_dir: cypress-reports/${{ github.run_number }}
